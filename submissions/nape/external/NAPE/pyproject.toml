[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "next_action_pred_eval"
version = "0.1.0"
description = "Benchmark for predictive auto-completion in spreadsheets"
readme = "README.md"
requires-python = ">=3.10"
license = "LicenseRef-PolyForm-Noncommercial-1.0.0"
license-files = ["LICENSE"]
authors = [
    {name = "Tejas Agrawal", email = "t-tagrawal@microsoft.com"},
    {name = "Gust Verbruggen", email = "gverbruggen@microsoft.com"},
]
keywords = ["spreadsheet", "prediction", "benchmark", "evaluation", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "openpyxl>=3.1",
    "Pillow>=10.0",
    "jinja2>=3.0",
    "tqdm>=4.60",
]

[project.optional-dependencies]
xlwings = ["xlwings>=0.30"]
openai = ["openai>=1.0"]
local = [
    "torch>=2.0",
    "transformers>=4.38",
    "accelerate>=0.25",
]
dashboard = [
    "streamlit>=1.37",
    "plotly>=5.0",
    "pandas>=2.0",
]
all = [
    "xlwings>=0.30",
    "openai>=1.0",
    "torch>=2.0",
    "transformers>=4.38",
    "accelerate>=0.25",
    "streamlit>=1.37",
    "plotly>=5.0",
    "pandas>=2.0",
]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "black>=23.0",
    "ruff>=0.1",
]

[project.urls]
Homepage = "https://github.com/Tej-55/NAPE"
Documentation = "https://github.com/Tej-55/NAPE#readme"
Repository = "https://github.com/Tej-55/NAPE"
"Project page" = "https://napeval.github.io"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.json"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
